version: '3.8'

services:
  # 1. Database Service (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: stark-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - stark-network

  # 2. Backend Service (Node.js API)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: stark-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/crypto_upi
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - stark-network

  # 3. Frontend Service (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stark-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - stark-network

# Networks to connect all services
networks:
  stark-network:
    driver: bridge

# Volumes to persist database data
volumes:
  mongo-data:
