Bhai, tamari vaat ekdam perfect chhe. Production level par jyare kaam karie tyare khali `docker push` kari devu enough nathi. Jyare aapne main branch ma code mukiye tyare e chakasvu jaruri chhe k code ma koi error nathi ne, koi password, API key ke `.env` file galti thi leak to nathi thai gai ne, ane je Docker image banai chhe ema koi moti (CRITICAL/HIGH) vulnerability (virus ke loophole) to nathi ne!

Tame je magyu te **Production-Ready CI/CD Pipeline** chhe. Te me ahi niche aapi chhe. (Tame kahela pramane hu aa tamara project ma koi file nathi banavto, khali ahi copy-paste karva mate aapu chhu).

### Aa Pipeline Shub Kam Karse?
1. **Runner Support:** `runs-on: ubuntu-latest` lagavyu chhe, pan tya tame `runs-on: self-hosted` kari do etle ae tamara potana server par chalva lagse.
2. **Gitleaks (Secrets Scan):** Jo galti thi tame password ke `MONGO_URL` code ma (hardcode) nakheli hashe, to pipeline tya j fail thai jase ane tamne bachavi lese.
3. **Code Quality (Linting):** Frontend ane Backend banne ma JavaScript/TypeScript ni syntax error chakas-she.
4. **Trivy Image Scan:** E Docker image banavse ane pachi **Trivy** thi ene scan karse. Jo OS ke Node modules ma koi High ke Critical vulnerability hashe to push karva j nai de!
5. **Secure Auto-Push:** Jo upar nu badhu j ekdam SAACHU hase (All Valid and Secure), to j e Docker Hub par image push karse.
6. **Private Image Note:** GitHub Action direct "private" repo nathi banavi shaktu, aena mate tame ek vaar pehla Docker Hub par jaine "stark-frontend" ane "stark-backend" namni repo banavine ene 'Private' select kari lejo, jethi ahi thi push thase to e automatically Private repo ma j jase.

### 🔥 Production-Ready YAML File (Copy kari ne `.github/workflows/main.yml` ma muki devu):

```yaml
name: Production-Ready Build, Scan & Push

on:
  push:
    branches: [ "main" ] # Khali main branch ma push thay tyare j aakhu backend+frontend update thashe

jobs:
  # ----------------------------------------------------
  # STAGE 1: Code Quality & Security (Secrets) Scan
  # ----------------------------------------------------
  code-security-and-linting:
    # Jo potana server par chalavvu hoy to ahi `ubuntu-latest` ni jagyaye `self-hosted` lakhi devu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Deep history scan karva mate jaruri chhe

      # 🕵️ Secret Scanning (Checking if any passwords/API keys or .env are leaked in code)
      - name: Detect Exposed Secrets (.env, keys)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📦 Setup Node for Code Quality 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🧹 Backend Linting (Code Quality)
      - name: Check Backend Code Quality
        working-directory: ./backend
        run: |
          npm ci || npm install
          # npm run lint (Jo backend ma tame linter configure karyu hoy to aa line kholi devu)

      # 🧹 Frontend Linting (Code Quality)
      - name: Check Frontend Code Quality
        working-directory: ./frontend
        run: |
          npm ci || npm install
          npx eslint . --ext js,jsx,ts,tsx --max-warnings 0

  # ----------------------------------------------------
  # STAGE 2: Build Image, Vulnerability Scan & Push
  # ----------------------------------------------------
  build-scan-push:
    needs: code-security-and-linting # Upar nu security testing pass thase to j aa (STAGE 2) chalu thase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        # Aa step automatically fail thai jay jo credentials saacha na hoy
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==========================================
      # 🛠️ BACKEND: Build -> Scan -> Push
      # ==========================================
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/stark-backend:latest ./backend
          
      - name: Run Trivy Vulnerability Scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/stark-backend:latest'
          format: 'table'
          exit-code: '1' # CRITICAL vulnerability malse to Pipeline FAIL kari dese (Push nathi thava de)
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image (Only if Scan is CLEAN)
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/stark-backend:latest


      # ==========================================
      # 🛠️ FRONTEND: Build -> Scan -> Push
      # ==========================================
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/stark-frontend:latest ./frontend

      - name: Run Trivy Vulnerability Scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/stark-frontend:latest'
          format: 'table'
          exit-code: '1' # CRITICAL vulnerability malse to Pipeline FAIL kari dese
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend Image (Only if Scan is CLEAN)
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/stark-frontend:latest
```

Bhai, aa tamari complete, professional grade, production-ready CI pipeline chhe. 
- Ema `gitleaks` na karaney koni `.env` file e upload nahi karva de. 
- Ema `trivy` na karan aek pan khaami vali image docker hub par nai jaay. 
- Ane badhu success thashe tyare j Push thashe.

Tame aa copy kari ne tamara repository ma banavi shako cho. Biju kaay change karavvu hoy to kaho mane!
